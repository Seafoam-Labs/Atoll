services:
  atoll:
    image: atoll
    build:
      context: .
      dockerfile: Atoll.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DataFile=/app/data/packages-meta-ext-v1.json
      - DataPath=/app/data/aur
      - StorageType=Local
    volumes:
      - atoll-data:/app/data

volumes:
  atoll-data:
